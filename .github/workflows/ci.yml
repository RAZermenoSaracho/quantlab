name: CI

on:
  push:
    branches: [ develop, main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: npm

      - name: Configure npm for CI stability
        run: |
          npm config set fetch-retries 5
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000
          npm config set maxsockets 3

      - name: Install dependencies (workspaces)
        run: npm ci

      - name: Workaround Rollup optional dependency bug (Linux)
        if: runner.os == 'Linux'
        run: |
          ROLLUP_VERSION=$(node -p "require('./node_modules/rollup/package.json').version")
          npm install --no-save @rollup/rollup-linux-x64-gnu@$ROLLUP_VERSION

      - name: Workaround LightningCSS optional dependency bug (Linux)
        if: runner.os == 'Linux'
        run: |
          LIGHTNINGCSS_VERSION=$(node -p "require('./node_modules/lightningcss/package.json').version")
          npm install --no-save lightningcss-linux-x64-gnu@$LIGHTNINGCSS_VERSION

      - name: Build frontend
        run: npm run build --workspace=frontend

      - name: Typecheck backend
        run: npm run build --workspace=backend
